aid: weis-markets
url: https://raw.githubusercontent.com/api-evangelist/weis-markets/refs/heads/main/apis.yml
modified: '2026-05-03'
description: >-
  Weis Markets is a regional supermarket chain operating grocery stores in the
  mid-Atlantic United States, with 197 store locations across Pennsylvania,
  Maryland, Delaware, New Jersey, New York, Virginia, and West Virginia. The
  company operates a digital commerce platform, loyalty rewards program (Weis
  Rewards), mobile app, and vendor/supplier integration ecosystem using EDI and
  supply chain APIs. Weis Markets uses Toshiba ELERA commerce platform for
  unified in-store and online commerce.
common:
  - type: Website
    url: https://www.weismarkets.com
  - type: VendorPortal
    url: https://weismarkets.streamcollab.com/
  - type: MobileApp
    url: https://www.weismarkets.com/wendys-app
  - type: GitHubOrg
    url: https://github.com/weis-markets
  - type: JSONLDContext
    url: json-ld/weis-markets-context.jsonld
  - type: Vocabulary
